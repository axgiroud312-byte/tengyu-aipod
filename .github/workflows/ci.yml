name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# [![CI](https://github.com/axgiroud312-byte/tengyu-aipod/actions/workflows/ci.yml/badge.svg)](https://github.com/axgiroud312-byte/tengyu-aipod/actions/workflows/ci.yml)
jobs:
  check:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test
