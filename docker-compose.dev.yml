# 腾域 aipod — 本地开发数据库
#
# 用途：开发期间给 packages/server 用的 Postgres 实例。
# 这是 dev 环境，不是 prod。生产数据库部署到云服务器时另起一个。
#
# 启动：  docker compose -f docker-compose.dev.yml up -d
# 停止：  docker compose -f docker-compose.dev.yml down
# 清空：  docker compose -f docker-compose.dev.yml down -v   # 注意：会删数据
#
# 连接字符串：postgresql://dev:dev@localhost:5432/tengyu_aipod
# 把这个写到 packages/server/.env 的 DATABASE_URL（不入 git）

services:
  postgres:
    image: postgres:16-alpine
    container_name: tengyu-pg-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: tengyu_aipod
    volumes:
      - tengyu-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d tengyu_aipod"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tengyu-pg-data:
    name: tengyu-pg-data
